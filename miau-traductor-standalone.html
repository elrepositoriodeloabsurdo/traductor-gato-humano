function fmtTime() {
  return new Date().toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit"});
}

function Toast({msg,onClose}) {
  useEffect(() => {
    const t = setTimeout(onClose, 2500);
    return () => clearTimeout(t);
  }, []);
  return <div className="toast">✓ {msg}</div>;
}

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function humanToCat(text, mood) {
  const base = [
    "miau",
    "mrrp",
    "prrrr",
    "mrrow",
    "MIAU",
    "hsss",
    "miau miau",
    "prrrr... mrrp",
  ];
  const actionsByMood = {
    feliz: ["*ronronea fuerte*", "*se frota en tu pierna*", "*parpadea lento*"],
    enojado: ["*mueve la cola con furia*", "*te juzga*", "*bufa con elegancia*"],
    hambre: ["*golpea el plato*", "*te sigue a la cocina*", "*maúlla al refrigerador*"],
    sueño: ["*se enrolla*", "*bosteza*", "*te ignora medio dormido*"],
    jugueton: ["*sale corriendo*", "*persigue una sombra*", "*salta sin motivo*"],
    asustado: ["*se esconde*", "*abre los ojos enorme*", "*se congela*"],
    mimoso: ["*se sube encima tuyo*", "*amasando pancita*", "*ronronea como motor*"],
    "desdén": ["*te mira y se va*", "*finge que no existes*", "*se lame la pata*"],
    neutral: ["*te observa*", "*mueve una oreja*", "*cambia de posición*"],
  };

  const emphasis = text.includes("!") || /te quiero|hambre|ahora|3am|bájate/i.test(text) ? "MIAAAU" : pick(base);
  const line1 = `${emphasis} ${pick(base)} ${pick(base)}`;
  const line2 = `${pick(actionsByMood[mood || "neutral"])} ${pick(base)}...`;
  const line3 = text.length > 35 ? `${pick(base).toUpperCase()} ${pick(base)} ${pick(actionsByMood[mood || "neutral"])}` : "";
  return [line1, line2, line3].filter(Boolean).join("\n");
}

function catToHuman(text, mood) {
  const clean = text.toLowerCase();
  if (/hss|grrr|mrrow!!|buf/i.test(text)) return pick(HUMAN_TRANSLATIONS.enojado);
  if (/prrr|ronr|mrrp/i.test(text) && /miau/.test(clean)) return pick(HUMAN_TRANSLATIONS[mood || "mimoso"]);
  if ((clean.match(/miau/g) || []).length >= 3 || /MIAU/.test(text)) return pick(HUMAN_TRANSLATIONS[mood || "hambre"]);
  if (/[\?]/.test(text)) return "Estoy investigando algo importantísimo. Puede ser una mosca. Puede ser tu alma.";
  return pick(HUMAN_TRANSLATIONS[mood || "neutral"]);
}

function App() {
  const [direction, setDirection] = useState("cat2human");
  const [input, setInput] = useState("");
  const [output, setOutput] = useState("");
  const [loading, setLoading] = useState(false);
  const [history, setHistory] = useState([]);
  const [factIdx, setFactIdx] = useState(0);
  const [mood, setMood] = useState(null);
  const [toast, setToast] = useState(null);
  const [copied, setCopied] = useState(false);
  const textareaRef = useRef(null);

  const isCatToHuman = direction === "cat2human";
  const examples = isCatToHuman ? EXAMPLES_CAT_TO_HUMAN : EXAMPLES_HUMAN_TO_CAT;
  const floaters = ["🐱","😺","🐾","😻","🙀","😸","😹","😼","🐈","🐈‍⬛"];

  const translate = async () => {
    if (!input.trim() || loading) return;
    setLoading(true);
    setOutput("");

    await new Promise(resolve => setTimeout(resolve, 700));

    const result = isCatToHuman ? catToHuman(input, mood) : humanToCat(input, mood);

    setOutput(result);
    setHistory(prev => [{
      direction,
      original: input,
      translated: result,
      mood,
      time: fmtTime(),
    }, ...prev.slice(0, 9)]);
    setLoading(false);
  };

  const copyOutput = () => {
    if (!output) return;
    navigator.clipboard.writeText(output).catch(() => {});
    setCopied(true);
    setToast("¡Traducción copiada!");
    setTimeout(() => setCopied(false), 2000);
  };

  const useExample = (text) => {
    setInput(text);
    setOutput("");
    textareaRef.current?.focus();
  };

  const handleKey = (e) => {
    if (e.key === "Enter" && e.ctrlKey) translate();
  };

  return (
    <>

                fontSize: `${18 + (i % 3) * 8}px`,

          </div>

          </p>

          <div className="dir-toggle">
            <button
              className={`dir-btn${isCatToHuman ? " on" : ""}`}
              onClick={() => { setDirection("cat2human"); setInput(""); setOutput(""); }}>
              😺 Gato → Humano
            </button>
            <span className="dir-arrow">⇄</span>
            <button
              className={`dir-btn${!isCatToHuman ? " on" : ""}`}
              onClick={() => { setDirection("human2cat"); setInput(""); setOutput(""); }}>
              🧑 Humano → Gato
            </button>
          </div>
        </div>

        <div className="mood-section fu">
          <div className="mood-card">
            <div className="mood-title">
              🎭 ¿Cuál es el estado de ánimo del gato?
              <span style={{fontSize:11,color:"var(--ink3)",fontWeight:400,marginLeft:4}}>(opcional)</span>
            </div>
            <div className="moods">
              {MOODS.map(m => (
                <button
                  key={m.id}
                  className={`mood-chip${mood === m.id ? " on" : ""}`}
                  onClick={() => setMood(mood === m.id ? null : m.id)}>
                  {m.emoji} {m.label}
                </button>
              ))}
            </div>
          </div>
        </div>

        <div className="translator">
          <div className="trans-card pop">
            <div className="panels">
              <div className="panel panel-l">
                <div className="panel-label">
                  <span className="panel-icon">{isCatToHuman ? "😺" : "🧑"}</span>
                  {isCatToHuman ? "Escribe en Gato" : "Escribe en Humano"}
                </div>
                <textarea
                  ref={textareaRef}
                  className="panel-textarea"
                  value={input}
                  onChange={e => setInput(e.target.value)}
                  onKeyDown={handleKey}
                  placeholder={isCatToHuman
                    ? "Ej: Miau miau MIAU!!\nprrrrr... mrrow\n\nCtrl+Enter para traducir"
                    : "Ej: ¿Por qué me despertaste a las 3am?\n\nCtrl+Enter para traducir"}
                  maxLength={400}
                />
                <div className="char-count">{input.length}/400</div>
              </div>

              <div className="panel">
                <div className="panel-label">
                  <span className="panel-icon">{isCatToHuman ? "🧑" : "😸"}</span>
                  {isCatToHuman ? "Traducción Humana" : "Traducción Gatuna"}
                </div>
                <div className="panel-output">
                  {loading ? <Thinking/> : output ? (
                    <div className="output-text">{output}</div>
                  ) : (
                    <div className="output-placeholder">
                      {isCatToHuman ? "La traducción aparecerá aquí 🐾" : "Tu mensaje en gato aparecerá aquí 😺"}
                    </div>
                  )}
                </div>
              </div>
            </div>

            <div className="trans-divider">
              <button className="translate-btn" onClick={translate} disabled={loading || !input.trim()}>
                {loading ? <><span className="spinner">⟳</span> Traduciendo...</> : <>{isCatToHuman ? "😺→🧑" : "🧑→😺"} Traducir</>}
              </button>

              {output && (
                <button className={`copy-btn${copied ? " copied" : ""}`} onClick={copyOutput}>
                  {copied ? "✓ Copiado" : "📋 Copiar"}
                </button>
              )}

              {(input || output) && (
                <button className="copy-btn" onClick={() => { setInput(""); setOutput(""); }}>
                  🗑 Limpiar
                </button>
              )}
            </div>
          </div>

          <div style={{fontSize:11,color:"var(--ink3)",textAlign:"center",marginTop:8}}>
            Esta versión usa React por CDN y lógica local para que sí abra bonito en HTML.
          </div>
        </div>

        <div className="examples fu">
          <div className="examples-title">💡 Ejemplos {isCatToHuman ? "de gato" : "para traducir"}</div>
          <div className="examples-grid">
            {examples.map((ex, i) => (
              <div key={i} className="example-card" onClick={() => useExample(ex.text)}>
                <div className="ex-from">{isCatToHuman ? "😺 Gato dice:" : "🧑 Humano dice:"}</div>
                <div className="ex-original">"{ex.text}"</div>
                <div style={{fontSize:10,color:"var(--ink3)",fontStyle:"italic"}}>{ex.hint}</div>
              </div>
            ))}
          </div>
        </div>

        <div className="catfact fu">
          <div className="fact-card" onClick={() => setFactIdx(i => (i + 1) % CAT_FACTS.length)} title="Click para otro dato">
            <span className="fact-ico">🐱</span>
            <div>
              <div className="fact-label">🔬 Dato felino #{factIdx + 1} · Click para otro</div>
              <div className="fact-text" key={factIdx}>{CAT_FACTS[factIdx]}</div>
            </div>
          </div>
        </div>

        {history.length > 0 && (
          <div className="history fu">
            <div className="history-title">
              📜 Historial de traducciones
              <button
                onClick={() => setHistory([])}
                style={{marginLeft:"auto",background:"none",border:"none",color:"var(--ink3)",fontSize:11,cursor:"pointer",textDecoration:"underline",fontFamily:"var(--ff)"}}>
                Borrar todo
              </button>
            </div>
            {history.map((h, i) => (
              <div key={i} className="hist-item">
                <span className="hist-ico">{h.direction === "cat2human" ? "😺" : "🧑"}</span>
                <div className="hist-content">
                  <div className="hist-dir">
                    {h.direction === "cat2human" ? "Gato → Humano" : "Humano → Gato"}
                    {h.mood && ` · ${MOODS.find(m => m.id === h.mood)?.emoji} ${MOODS.find(m => m.id === h.mood)?.label}`}
                  </div>
                  <div className="hist-original">"{h.original}"</div>
                  <div className="hist-translated">{h.translated}</div>
                  <div className="hist-time">{h.time}</div>
                </div>
              </div>
            ))}
          </div>
        )}

        <footer>
          Hecho con <span>❤️</span> y muchos maullidos · MiauTraductor by VibeCodingChile
          <br />
          <span style={{fontSize:10,opacity:.6,marginTop:4,display:"block"}}>
            HTML standalone listo para GitHub Pages o abrir directo desde Android.
          </span>
        </footer>
      </div>

      {toast && <Toast msg={toast} onClose={() => setToast(null)} />}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
  </script>
</body>
</html>
